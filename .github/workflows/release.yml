name: Release

# When a new tag with the format v* is pushed, release a new version to GitHub Releases.

on:
  push:
    paths-ignore:
      - setup.cfg
  create:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set version from tag
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: sed -i "s/^version=.*/version=${GITHUB_REF_NAME#v}/" setup.cfg

      - name: Install build dependencies
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  release:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload "${{ github.ref_name }}" dist/*
          else
            gh release create "${{ github.ref_name }}" dist/* --generate-notes
          fi

  post-release:
    name: Bump to dev version
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Set dev version and push
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s/^version=.*/version=${VERSION}.dev0/" setup.cfg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add setup.cfg
          git commit -m "Bump version to ${VERSION}.dev0"
          git push
